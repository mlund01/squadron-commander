version: 2

project_name: command-center

before:
  hooks:
    - cmd: sh -c "cd web && npm ci && npm run build"

builds:
  - id: command-center
    binary: command-center
    main: .
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: command-center
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: mlund01
    name: squadron-command-center
